server:
  hostname: "0.0.0.0"
  port: __SERVER_PORT__
  http_only: true
  public_url: "__PUBLIC_URL__"

gate_client:
  hostname: "__PUBLIC_HOST__"
  port: 443
  scheme: "https"
  path: "/gate"

database:
  config:
    type: "sqlite"
    sqlite:
      path: "database/configdb.db"
      options: "_journal_mode=WAL&_busy_timeout=5000&_pragma=foreign_keys(1)"
      max_open_conns: 500
      max_idle_conns: 100
      conn_max_lifetime: 3600

  runtime:
    type: "sqlite"
    sqlite:
      path: "database/runtimedb.db"
      options: "_journal_mode=WAL&_busy_timeout=5000&_pragma=foreign_keys(1)"
      max_open_conns: 500
      max_idle_conns: 100
      conn_max_lifetime: 3600

  user:
    type: "sqlite"
    sqlite:
      path: "database/userdb.db"
      options: "_journal_mode=WAL&_busy_timeout=5000&_pragma=foreign_keys(1)"
      max_open_conns: 500
      max_idle_conns: 100
      conn_max_lifetime: 3600

crypto:
  encryption:
    key: "file://config/certs/crypto.key"
  password_hashing:
    algorithm: "PBKDF2"
  keys:
    - id: "default-key"
      cert_file: "config/certs/signing.cert"
      key_file: "config/certs/signing.key"

jwt:
  preferred_key_id: "default-key"

cors:
  allowed_origins:
    - "__PUBLIC_URL__"

passkey:
  allowed_origins:
    - "__PUBLIC_URL__"

consent:
  enabled: false
